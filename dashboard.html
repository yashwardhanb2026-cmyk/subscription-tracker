<main class="flex-grow pt-32 pb-24 px-8 max-w-7xl mx-auto w-full">
<!-- Hero: Spend Section -->

<div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
<div class="space-y-2">
<span class="text-xs font-medium uppercase tracking-[0.15em] text-on-surface-variant font-label">Current Monthly Allocation</span>
<h1 id="monthly-allocation" class="text-7xl md:text-8xl font-black tracking-tighter text-on-surface">
                        $0.00
                    </h1>
</div>
<div class="w-full md:w-96 space-y-4">
<div class="flex justify-between items-center text-sm font-medium">
<span class="text-on-surface-variant flex gap-1 items-center">Monthly Limit: <span id="limit-text" class="cursor-pointer border-b border-dashed border-primary/50 hover:text-primary transition-colors" title="Click to change your limit" onclick="editLimit()">₹10,000</span></span>
<span id="limit-percent" class="text-primary">0%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div id="limit-bar" class="h-full bg-gradient-to-r from-secondary to-secondary-dim w-[0%] rounded-full transition-all duration-1000"></div>
</div>
</div>
</div>
</section>
<!-- Active Subscriptions: Asymmetric Bento Grid -->
<section class="mb-20">
<div class="flex items-center justify-between mb-8">
<h2 class="text-2xl font-bold tracking-tight">Active Subscriptions</h2>
<button onclick="document.getElementById('subscriptions-container').scrollIntoView({ behavior: 'smooth', block: 'start' })" class="text-sm font-semibold text-primary hover:text-on-surface transition-colors flex items-center gap-2">
                    View Gallery <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<div id="subscriptions-container" class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <!-- Subscriptions will be dynamically injected here -->
</div>

<!-- Upcoming Payments removed for now -->

<!-- Floating Action Button -->
<a href="/add-subscription.html" class="fixed bottom-12 right-12 premium-gradient text-on-primary-fixed font-bold py-4 px-8 rounded-full flex items-center gap-3 shadow-[0_20px_40px_rgba(0,0,0,0.4)] hover:-translate-y-1 transition-all duration-300 active:scale-95 group">
<span class="material-symbols-outlined group-hover:rotate-90 transition-transform duration-300" data-icon="add">add</span>
<span>Add Subscription</span>
</a>

            © 2026 THE CURATOR. ENGINEERED BY YASHWARDHAN.
        </div>
<div class="flex gap-8">
<a class="text-xs font-medium uppercase tracking-widest font-['Inter'] text-zinc-500 hover:text-zinc-200 transition-colors" href="#">Privacy</a>

<!-- Settings Modal -->
<div id="settings-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300 antialiased">
    <div class="glass-card w-full max-w-md p-8 pt-10 rounded-3xl border border-white/10 relative shadow-2xl transform scale-95 transition-transform duration-300" id="settings-card">
        <button onclick="closeSettings()" class="absolute top-6 right-6 text-on-surface-variant hover:text-white transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
        <div class="mb-8 flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-primary/20 rounded-full flex items-center justify-center mb-4 border border-primary/50 shadow-[0_0_20px_rgba(var(--primary),0.3)] text-3xl font-bold uppercase text-primary" id="profile-initial">
                ?
            </div>
            <h2 class="text-2xl font-bold tracking-tight" id="profile-name">Loading...</h2>
            <p class="text-sm text-on-surface-variant font-mono mt-1" id="profile-email"></p>
        </div>
        
        <div class="space-y-4 shadow-inner bg-black/30 p-6 rounded-2xl border border-white/5">
            <div class="flex justify-between items-center">
                <div>
                   <h3 class="font-bold text-sm">Monthly Allocation</h3>
                   <p class="text-[10px] text-on-surface-variant">Your spending threshold</p>
                </div>
                <button onclick="editLimit()" class="text-xs font-bold text-primary hover:text-white transition-colors border border-primary/50 px-4 py-2 rounded-full hover:bg-primary/20 shadow-md">Edit Limit</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    axios.defaults.baseURL = 'http://localhost:5000/api';
    
    // Setup generic Interceptor
    axios.interceptors.request.use(config => {
        const token = localStorage.getItem('token');
        if (token) {
            config.headers.Authorization = `Bearer ${token}`;
        }
        return config;
    });
    
    // Auth Guard
    if (!localStorage.getItem('token')) {
        window.location.href = '/index.html';
    }

    const logoutBtn = document.getElementById('logout-btn');
    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/index.html';
    });

    // Helper formatting (Indian Rupees)
    const formatCurrency = (number) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(number);

    // Fetch and populate
    async function initDashboard() {
        try {
            const summaryRes = await axios.get('/subscriptions/summary');
            const monthlyTotal = summaryRes.data.data.totalMonthly || 0;
            document.getElementById('monthly-allocation').textContent = formatCurrency(monthlyTotal);
            
            // Update Limit Bar
            const monthlyLimit = parseFloat(localStorage.getItem('monthlyLimit')) || 10000;
            document.getElementById('limit-text').textContent = formatCurrency(monthlyLimit);

            const percentRaw = (monthlyTotal / monthlyLimit) * 100;
            const percentDisplay = percentRaw > 0 && percentRaw < 1 ? parseFloat(percentRaw.toFixed(2)) : parseFloat(percentRaw.toFixed(1));
            const percentWidth = Math.min(percentDisplay, 100);

            document.getElementById('limit-percent').textContent = `${percentDisplay}%`;
            document.getElementById('limit-bar').style.width = `${percentWidth}%`;

            const subsRes = await axios.get('/subscriptions');
            const container = document.getElementById('subscriptions-container');
            container.innerHTML = '';
            
            const subs = subsRes.data.data;
            if (subs.length === 0) {
                container.innerHTML = `
                    <div class="md:col-span-4 border border-dashed border-outline-variant/20 rounded-xl flex items-center justify-center p-12">
                        <div class="text-center">
                            <p class="text-on-surface-variant text-sm mb-4">Your vault is completely empty.</p>
                            <a href="/add-subscription.html" class="inline-block text-xs font-bold uppercase tracking-widest text-primary border border-primary/20 px-6 py-3 rounded-full hover:bg-primary/10 transition-all">Add First Subscription</a>
                        </div>
                    </div>`;
                return;
            }

            subs.forEach((sub, i) => {
                // Dynamic colors based on index or name
                const isWide = (i % 3 === 0);
                const colSpanClass = isWide ? 'md:col-span-2' : '';
                const baseColorMap = {
                    'Netflix': 'red-600',
                    'Spotify': 'emerald-500', 
                    'Amazon': 'sky-400',
                    'Disney': 'indigo-600'
                };
                
                let hue = 'primary'; // fallback
                Object.keys(baseColorMap).forEach(key => {
                    if(sub.name.toLowerCase().includes(key.toLowerCase())) hue = baseColorMap[key];
                });

                container.insertAdjacentHTML('beforeend', `
                    <div class="${colSpanClass} glass-card rounded-xl p-8 border border-outline-variant/10 relative overflow-hidden group hover:bg-surface-container-high transition-all duration-300">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-${hue}/10 blur-[40px] -mr-12 -mt-12 group-hover:bg-${hue}/20 transition-all"></div>
                        <div class="relative z-10 flex flex-col justify-between h-full">
                            <div class="flex justify-between items-start">
                                <span class="material-symbols-outlined text-${hue} text-4xl">subscriptions</span>
                                <div class="flex gap-2 items-center">
                                     ${sub.status === 'inactive' ? '<span class="bg-error/20 text-error text-[10px] uppercase tracking-wider px-2 py-1 rounded">Inactive</span>' : ''}
                                     <button onclick="deleteSubscription('${sub._id}')" class="text-on-surface-variant hover:text-error transition-colors p-1 flex items-center justify-center rounded-full hover:bg-error/10" title="Delete Subscription">
                                         <span class="material-symbols-outlined text-[16px]">delete</span>
                                     </button>
                                </div>
                            </div>
                            <div class="mt-8">
                                <h3 class="text-2xl font-bold tracking-tight">${sub.name}</h3>
                                <p class="text-on-surface-variant text-xs mt-1">${sub.category || 'General'}</p>
                                <div class="mt-4 flex items-baseline gap-1">
                                    <span class="text-3xl font-bold tracking-tighter">${formatCurrency(sub.price)}</span>
                                    <span class="text-on-surface-variant text-sm">/${sub.billingCycle === 'yearly' ? 'yr' : 'mo'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });

        } catch (err) {
            console.error("Dashboard error:", err);
            if (err.response?.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/index.html';
            }
        }
    }

    // EXPOSE GLOBAL FUNCTION TO HANDLE LIMIT CHANGE
    window.editLimit = function() {
        const currentLimit = localStorage.getItem('monthlyLimit') || 10000;
        const newLimit = prompt("Enter your new custom monthly allocation limit (₹):", currentLimit);
        if(newLimit && !isNaN(newLimit) && Number(newLimit) > 0) {
            localStorage.setItem('monthlyLimit', Number(newLimit));
            initDashboard(); // Reload visually
        }
    };

    // EXPOSE GLOBAL FUNCTION TO HANDLE DELETION
    window.deleteSubscription = async function(id) {
        if(confirm("Delete this subscription? This action cannot be undone.")) {
            try {
                await axios.delete(`/subscriptions/${id}`);
                initDashboard(); // Reload visually
            } catch (err) {
                console.error("Delete failed:", err);
                alert("Could not delete subscription.");
            }
        }
    };

    // SETTINGS LOGIC
    window.openSettings = async function() {
        const modal = document.getElementById('settings-modal');
        const card = document.getElementById('settings-card');
        
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            card.classList.remove('scale-95');
        }, 10);

        try {
            const res = await axios.get('/auth/me'); // Automatically uses interceptor token
            const user = res.data.data;
            document.getElementById('profile-name').textContent = user.name;
            document.getElementById('profile-email').textContent = user.email;
            document.getElementById('profile-initial').textContent = user.name.charAt(0);
        } catch(err) {
            console.error("Failed to fetch profile", err);
            document.getElementById('profile-name').textContent = "Unknown User";
        }
    };

    window.closeSettings = function() {
        const modal = document.getElementById('settings-modal');
        const card = document.getElementById('settings-card');
        modal.classList.add('opacity-0');
        card.classList.add('scale-95');
        setTimeout(() => modal.classList.add('hidden'), 300);
    };

    initDashboard();

</script>
